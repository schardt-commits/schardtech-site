name: Atualizar vídeos recentes

on:
  schedule:
    - cron: '0 12 * * *'  # 12h UTC = 9h horário de Brasília
  workflow_dispatch:       # permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Buscar últimos vídeos e atualizar script.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python update_videos.py

      - name: Fazer commit se houve mudança
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add script.js
          git diff --staged --quiet || git commit -m "chore: atualizar vídeos recentes"
          git push
